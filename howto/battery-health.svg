<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 430" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="230" height="430" rx="26" fill="#efeff4"/>
  <clipPath id="scr2"><rect width="230" height="430" rx="26"/></clipPath>
  <g clip-path="url(#scr2)">
    <text x="20" y="26" font-size="13" font-weight="700" fill="#000">9:41</text>
    <rect x="194" y="18" width="16" height="11" rx="2" fill="none" stroke="#000" stroke-width="1.4"/>
    <rect x="196" y="20" width="9" height="7" rx="1" fill="#000"/>

    <text x="14" y="58" font-size="18" fill="#007aff">&#8249;</text>
    <text x="118" y="58" font-size="15" font-weight="700" fill="#000" text-anchor="middle">Battery Health</text>

    <!-- maximum capacity card (highlighted) -->
    <rect x="12" y="78" width="206" height="64" rx="11" fill="#fff"/>
    <rect x="12" y="78" width="206" height="64" rx="11" fill="#dbeeff"/>
    <text x="22" y="104" font-size="13" font-weight="700" fill="#000">Maximum Capacity</text>
    <text x="208" y="104" font-size="15" font-weight="700" fill="#007aff" text-anchor="end">89%</text>
    <text x="22" y="126" font-size="10" fill="#8e8e93">This is a measure of battery capacity relative</text>
    <text x="22" y="138" font-size="10" fill="#8e8e93">to when it was new.</text>

    <!-- peak performance card -->
    <rect x="12" y="156" width="206" height="76" rx="11" fill="#fff"/>
    <text x="22" y="180" font-size="13" font-weight="700" fill="#000">Peak Performance Capability</text>
    <text x="22" y="202" font-size="10" fill="#8e8e93">Your battery is currently supporting normal</text>
    <text x="22" y="214" font-size="10" fill="#8e8e93">peak performance.</text>

    <!-- battery glyph -->
    <rect x="80" y="280" width="60" height="30" rx="6" fill="none" stroke="#34c759" stroke-width="3"/>
    <rect x="141" y="288" width="5" height="14" rx="2" fill="#34c759"/>
    <rect x="85" y="285" width="44" height="20" rx="3" fill="#34c759"/>
    <text x="115" y="340" font-size="12" fill="#8e8e93" text-anchor="middle">Settings &#8250; Battery</text>
  </g>
</svg>
