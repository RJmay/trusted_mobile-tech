<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 430" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="230" height="430" rx="26" fill="#efeff4"/>
  <clipPath id="scr"><rect width="230" height="430" rx="26"/></clipPath>
  <g clip-path="url(#scr)">
    <!-- status bar -->
    <text x="20" y="26" font-size="13" font-weight="700" fill="#000">9:41</text>
    <path d="M196 18 h18 a3 3 0 0 1 3 3 v6 a3 3 0 0 1 -3 3 h-18 z" fill="#000"/>
    <rect x="170" y="18" width="16" height="11" rx="2" fill="none" stroke="#000" stroke-width="1.4"/>
    <rect x="172" y="20" width="9" height="7" rx="1" fill="#000"/>
    <!-- nav bar -->
    <text x="14" y="58" font-size="15" fill="#007aff">&#8249; General</text>
    <text x="115" y="58" font-size="16" font-weight="700" fill="#000" text-anchor="middle">About</text>

    <!-- card 1 -->
    <rect x="12" y="76" width="206" height="76" rx="11" fill="#fff"/>
    <text x="22" y="100" font-size="13" fill="#000">Name</text>
    <text x="208" y="100" font-size="13" fill="#8e8e93" text-anchor="end">iPhone</text>
    <line x1="22" y1="113" x2="218" y2="113" stroke="#e3e3e8" stroke-width="1"/>
    <text x="22" y="138" font-size="13" fill="#000">Software Version</text>
    <text x="208" y="138" font-size="13" fill="#8e8e93" text-anchor="end">17.5</text>

    <!-- card 2 (highlighted model + capacity) -->
    <rect x="12" y="166" width="206" height="114" rx="11" fill="#fff"/>
    <rect x="12" y="166" width="206" height="38" rx="0" fill="#dbeeff"/>
    <text x="22" y="190" font-size="13" font-weight="700" fill="#000">Model Name</text>
    <text x="208" y="190" font-size="13" font-weight="700" fill="#007aff" text-anchor="end">iPhone 15 Pro</text>
    <line x1="22" y1="204" x2="218" y2="204" stroke="#e3e3e8" stroke-width="1"/>
    <text x="22" y="228" font-size="13" fill="#000">Model Number</text>
    <text x="208" y="228" font-size="13" fill="#8e8e93" text-anchor="end">MTV...</text>
    <line x1="22" y1="242" x2="218" y2="242" stroke="#e3e3e8" stroke-width="1"/>
    <text x="22" y="266" font-size="13" font-weight="700" fill="#000">Capacity</text>
    <text x="208" y="266" font-size="13" font-weight="700" fill="#007aff" text-anchor="end">256 GB</text>

    <!-- card 3 -->
    <rect x="12" y="294" width="206" height="40" rx="11" fill="#fff"/>
    <text x="22" y="318" font-size="13" fill="#000">Serial Number</text>
    <text x="208" y="318" font-size="13" fill="#8e8e93" text-anchor="end">F2L...</text>
  </g>
</svg>
