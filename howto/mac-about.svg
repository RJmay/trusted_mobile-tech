<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 360" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="300" height="360" rx="14" fill="#ececec"/>
  <clipPath id="w"><rect width="300" height="360" rx="14"/></clipPath>
  <g clip-path="url(#w)">
    <!-- title bar -->
    <rect width="300" height="34" fill="#dcdcdc"/>
    <circle cx="20" cy="17" r="6" fill="#ff5f57"/><circle cx="40" cy="17" r="6" fill="#febc2e"/><circle cx="60" cy="17" r="6" fill="#28c840"/>
    <text x="150" y="22" font-size="13" font-weight="700" fill="#333" text-anchor="middle">About This Mac</text>

    <!-- Apple logo -->
    <path d="M150 70 c-3 0 -7 2 -9 5 c2 1 4 4 4 8 c0 5 -4 8 -4 8 c1 3 4 7 7 7 c2 0 3 -1 5 -1 c2 0 3 1 5 1 c4 0 7 -6 7 -6 c-4 -2 -5 -8 -1 -11 c-2 -3 -5 -4 -8 -4 c-2 0 -4 1 -5 1 c0 -3 2 -6 5 -7 c-1 -1 -4 -1 -8 1 z M154 60 c2 -2 2 -5 2 -6 c-2 0 -4 1 -6 3 c-1 1 -2 4 -2 6 c2 0 4 -1 6 -3 z" fill="#555"/>

    <text x="150" y="120" font-size="22" font-weight="700" fill="#1a1a1a" text-anchor="middle">MacBook Air</text>
    <text x="150" y="140" font-size="12" fill="#777" text-anchor="middle">13-inch, 2022</text>

    <!-- spec rows -->
    <g font-size="13">
      <rect x="28" y="166" width="244" height="34" rx="6" fill="#d8ecff"/>
      <text x="120" y="187" fill="#333" text-anchor="end" font-weight="700">Chip</text>
      <text x="136" y="187" fill="#007aff" font-weight="700">Apple M2</text>

      <text x="120" y="220" fill="#333" text-anchor="end" font-weight="700">Memory</text>
      <text x="136" y="220" fill="#444">16 GB</text>

      <text x="120" y="250" fill="#333" text-anchor="end" font-weight="700">Startup disk</text>
      <text x="136" y="250" fill="#444">Macintosh HD</text>

      <text x="120" y="280" fill="#333" text-anchor="end" font-weight="700">Serial number</text>
      <text x="136" y="280" fill="#444">C02X...</text>

      <text x="120" y="310" fill="#333" text-anchor="end" font-weight="700">macOS</text>
      <text x="136" y="310" fill="#444">Sonoma 14.5</text>
    </g>
  </g>
</svg>
